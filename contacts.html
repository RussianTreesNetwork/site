<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — RTN</title>
    <style>
        :root {
            --bg: #f97401;
            --fg: #093c36;
            --text: #ffffff;
            --border: 2px solid var(--fg);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: var(--border);
            padding-bottom: 1rem;
        }

        .logo-container {
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .logo-container img {
            height: 60px;
            width: auto;
            border: var(--border);
            background: var(--fg);
            padding: 5px;
            border-radius: 8px;        }

        .site-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text);
        }

        nav {
            margin: 1rem 0 2rem 0;
            width: 100%;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            background: var(--fg);
            padding: 0.8rem;
            border-radius: 12px;
            border: var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        nav a:hover {
            background: var(--bg);
            color: var(--fg);
        }

        main {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .content-block {            background: var(--fg);
            padding: 2rem;
            border-radius: 12px;
            border: var(--border);
            margin-bottom: 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--text);
            border-bottom: 1px dashed rgba(255,255,255,0.3);
            padding-bottom: 0.5rem;
        }

        p {
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        footer {
            text-align: center;
            margin-top: auto;
            padding-top: 1rem;
            border-top: var(--border);
            font-size: 0.9rem;
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            body {
                padding: 0.5rem;
            }

            header {
                margin-bottom: 1rem;
                padding-bottom: 0.5rem;
            }

            .logo-container img {
                height: 50px;
            }

            .site-title {
                font-size: 1.4rem;
            }

            nav ul {
                flex-wrap: nowrap;                overflow-x: auto;
                justify-content: flex-start;
                padding: 0.5rem;
                gap: 0.5rem;
                scrollbar-width: none;
            }
            
            nav ul::-webkit-scrollbar {
                display: none;
            }

            nav a {
                padding: 0.4rem 0.8rem;
                font-size: 0.85rem;
                flex-shrink: 0;
            }

            .content-block {
                padding: 1.2rem;
                border-radius: 8px;
            }

            h1 {
                font-size: 1.4rem;
                margin-bottom: 1rem;
            }
            
            p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="logo.png" alt="RTN Logo">
        </div>
        <div class="site-title">Russian Trees Network</div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="about.html">Описание</a></li>
            <li><a href="rules.html">Правила</a></li>
            <li><a href="social.html">Соц.сети</a></li>
        </ul>
    </nav>
    <main>
        <div class="content-block">
            <h1>📬 Контакты</h1>
            <p>Контактная информация для Russian Trees Network (RTN) будет добавлена позже.</p>
            <p>Следите за новостями в наших социальных сетях!</p>
        </div>
    </main>

    <footer>
        <p>RTN. Все права принадлежат Русским Ёлочкам. 2026 ∞</p>
    </footer>
</body>
</html>
